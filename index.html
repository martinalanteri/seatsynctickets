<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";

import { 
  getAuth, 
  signInWithEmailAndPassword, 
  onAuthStateChanged, 
  signOut 
} from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

import {
  getFirestore,
  collection,
  addDoc,
  onSnapshot,
  serverTimestamp,
  query,
  where,
  getDocs,
  deleteDoc,
  doc
} from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

// CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyBJeSiCRIltuDtB9ztQju8sBZ2zJfYUMtI",
  authDomain: "seatsync-3e23b.firebaseapp.com",
  projectId: "seatsync-3e23b",
  storageBucket: "seatsync-3e23b.firebasestorage.app",
  messagingSenderId: "446161771063",
  appId: "1:446161771063:web:02de1da576721fe8babdb2"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

console.log("Firestore Database connected successfully!");

// STATE
let currentUser = null;
let selectedSeat = null;
let bookings = [];
let locks = [];

// UI
const loginScreen = document.getElementById("loginScreen");
const appScreen = document.getElementById("app");
const seatingEl = document.getElementById("seating");
const formEl = document.getElementById("bookingForm");
const seatNumberEl = document.getElementById("seatNumber");

const PRICE_ADULT = 10;
const PRICE_CHILD = 5;

// SEATS
const seats = [];
for (let i = 1; i <= 25; i++) {
  seats.push({ id: i, taken: false, locked: false });
}

// AUTH
onAuthStateChanged(auth, (user) => {
  if (user) {
    currentUser = user;
    loginScreen.classList.add("hidden");
    appScreen.classList.remove("hidden");

    startRealtimeListeners();
  } else {
    loginScreen.classList.remove("hidden");
    appScreen.classList.add("hidden");
  }
});

// LOGIN
window.login = async function () {
  const email = email.value;
  const password = password.value;
  await signInWithEmailAndPassword(auth, email, password);
};

// LOGOUT
window.logout = function () {
  signOut(auth);
};

// RENDER
function renderSeats() {
  seatingEl.innerHTML = "";

  seats.forEach(seat => {
    const btn = document.createElement("button");

    btn.textContent = seat.id;

    if (seat.taken) {
      btn.className = "p-4 rounded text-white bg-red-500";
    } else if (seat.locked) {
      btn.className = "p-4 rounded text-white bg-yellow-500";
    } else {
      btn.className = "p-4 rounded text-white bg-green-500";
    }

    btn.onclick = () => handleSeatClick(seat);
    seatingEl.appendChild(btn);
  });
}

// CLICK SEAT → CREATE LOCK
async function handleSeatClick(seat) {
  if (seat.taken || seat.locked) return;

  // check if already locked
  const q = query(
    collection(db, "seatLocks"),
    where("seatId", "==", seat.id)
  );

  const snapshot = await getDocs(q);

  if (!snapshot.empty) {
    alert("Seat is being reserved by someone else.");
    return;
  }

  // create lock (2 minutes)
  const expiresAt = Date.now() + 2 * 60 * 1000;

  await addDoc(collection(db, "seatLocks"), {
    seatId: seat.id,
    userId: currentUser.uid,
    expiresAt
  });

  selectedSeat = seat;
  seatNumberEl.textContent = seat.id;
  formEl.classList.remove("hidden");
}

// SAVE BOOKING
window.saveBooking = async function () {
  const adults = parseInt(document.getElementById("adults").value) || 0;
  const children = parseInt(document.getElementById("children").value) || 0;

  if (adults + children === 0) return alert("Enter tickets");

  const total = adults * PRICE_ADULT + children * PRICE_CHILD;

  await addDoc(collection(db, "bookings"), {
    seatId: selectedSeat.id,
    adults,
    children,
    total,
    userId: currentUser.uid,
    createdAt: serverTimestamp()
  });

  // remove lock after booking
  await removeLock(selectedSeat.id);

  cancelBooking();
};

// REMOVE LOCK
async function removeLock(seatId) {
  const q = query(
    collection(db, "seatLocks"),
    where("seatId", "==", seatId),
    where("userId", "==", currentUser.uid)
  );

  const snapshot = await getDocs(q);

  snapshot.forEach(async (d) => {
    await deleteDoc(doc(db, "seatLocks", d.id));
  });
}

// REALTIME LISTENERS
function startRealtimeListeners() {
  // BOOKINGS
  onSnapshot(collection(db, "bookings"), (snapshot) => {
    bookings = [];

    seats.forEach(s => {
      s.taken = false;
      s.locked = false;
    });

    snapshot.forEach(doc => {
      const data = doc.data();
      bookings.push(data);

      const seat = seats.find(s => s.id === data.seatId);
      if (seat) seat.taken = true;
    });
  });

  // LOCKS
  onSnapshot(collection(db, "seatLocks"), async (snapshot) => {
    locks = [];

    const now = Date.now();

    snapshot.forEach(async (d) => {
      const data = d.data();

      // auto-expire
      if (data.expiresAt < now) {
        await deleteDoc(doc(db, "seatLocks", d.id));
        return;
      }

      locks.push(data);

      const seat = seats.find(s => s.id === data.seatId);
      if (seat && !seat.taken) seat.locked = true;
    });

    renderSeats();
    updateRevenue();
  });
}

// REVENUE
function updateRevenue() {
  let revenue = 0;
  let tickets = 0;

  bookings.forEach(b => {
    revenue += b.total;
    tickets += b.adults + b.children;
  });

  document.getElementById("revenue").textContent = revenue;
  document.getElementById("tickets").textContent = tickets;
}

// CANCEL
window.cancelBooking = async function () {
  if (selectedSeat) {
    await removeLock(selectedSeat.id);
  }

  formEl.classList.add("hidden");
  document.getElementById("adults").value = "";
  document.getElementById("children").value = "";
};

// INIT
renderSeats();
</script>
