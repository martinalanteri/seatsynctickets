<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>SeatSync</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 text-black">

  <div class="max-w-4xl mx-auto p-6">

    <!-- LOGIN SCREEN -->
    <div id="loginScreen" class="bg-white p-6 rounded shadow">
      <h1 class="text-2xl font-bold mb-4">Login to SeatSync</h1>

      <input id="email" type="email" placeholder="Email" class="border p-2 w-full mb-2">
      <input id="password" type="password" placeholder="Password" class="border p-2 w-full mb-2">

      <button onclick="login()" class="bg-black text-white px-4 py-2 w-full">Login</button>
    </div>

    <!-- APP -->
    <div id="app" class="hidden">
      <h1 class="text-3xl font-bold mb-4 text-center">🎭 SeatSync</h1>

      <button onclick="logout()" class="mb-4 text-sm text-gray-600">Logout</button>

      <!-- Revenue -->
      <div class="bg-white p-4 rounded shadow mb-6">
        <p>Total Tickets Sold: <span id="tickets">0</span></p>
        <p>Total Revenue: $<span id="revenue">0</span></p>
      </div>

      <!-- Seating -->
      <div id="seating" class="grid grid-cols-5 gap-2 mb-6"></div>

      <!-- Booking Form -->
      <div id="bookingForm" class="hidden bg-white p-4 rounded shadow">
        <h2 class="text-xl mb-2">Book Seat <span id="seatNumber"></span></h2>

        <label class="block mb-2">
          Adults:
          <input id="adults" type="number" min="0" class="border p-1 w-full">
        </label>

        <label class="block mb-2">
          Children:
          <input id="children" type="number" min="0" class="border p-1 w-full">
        </label>

        <button onclick="saveBooking()" class="bg-black text-white px-4 py-2 mt-2">Confirm Booking</button>
        <button onclick="cancelBooking()" class="ml-2 text-gray-600">Cancel</button>
      </div>
    </div>

  </div>

  <script type="module">
    // 🔥 Firebase Imports
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";

    import { 
      getAuth, 
      signInWithEmailAndPassword, 
      onAuthStateChanged, 
      signOut 
    } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    import {
      getFirestore,
      collection,
      addDoc,
      getDocs
    } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    // ✅ YOUR REAL CONFIG
    const firebaseConfig = {
      apiKey: "AIzaSyBJeSiCRIltuDtB9ztQju8sBZ2zJfYUMtI",
      authDomain: "seatsync-3e23b.firebaseapp.com",
      projectId: "seatsync-3e23b",
      storageBucket: "seatsync-3e23b.firebasestorage.app",
      messagingSenderId: "446161771063",
      appId: "1:446161771063:web:02de1da576721fe8babdb2"
    };

    // 🔥 Initialize Firebase
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    console.log("Firestore Database connected successfully!");

    let currentUser = null;

    // UI Elements
    const loginScreen = document.getElementById("loginScreen");
    const appScreen = document.getElementById("app");

    // Auth State
    onAuthStateChanged(auth, (user) => {
      if (user) {
        currentUser = user;
        loginScreen.classList.add("hidden");
        appScreen.classList.remove("hidden");

        loadBookings(); // 🔥 Load from Firestore
      } else {
        loginScreen.classList.remove("hidden");
        appScreen.classList.add("hidden");
      }
    });

    // Login
    window.login = async function () {
      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;

      try {
        await signInWithEmailAndPassword(auth, email, password);
      } catch (error) {
        alert(error.message);
      }
    };

    // Logout
    window.logout = function () {
      signOut(auth);
    };

    // ===== APP LOGIC =====

    const seatingEl = document.getElementById("seating");
    const formEl = document.getElementById("bookingForm");
    const seatNumberEl = document.getElementById("seatNumber");

    let selectedSeat = null;
    let bookings = [];

    const PRICE_ADULT = 10;
    const PRICE_CHILD = 5;

    const seats = [];
    for (let i = 1; i <= 25; i++) {
      seats.push({ id: i, taken: false });
    }

    function renderSeats() {
      seatingEl.innerHTML = "";
      seats.forEach(seat => {
        const btn = document.createElement("button");
        btn.textContent = seat.id;
        btn.className = `p-4 rounded text-white ${
          seat.taken ? "bg-red-500" : "bg-green-500"
        }`;

        btn.onclick = () => handleSeatClick(seat);
        seatingEl.appendChild(btn);
      });
    }

    function handleSeatClick(seat) {
      if (seat.taken) return;
      selectedSeat = seat;
      seatNumberEl.textContent = seat.id;
      formEl.classList.remove("hidden");
    }

    // 🔥 SAVE TO FIRESTORE
    window.saveBooking = async function () {
      const adults = parseInt(document.getElementById("adults").value) || 0;
      const children = parseInt(document.getElementById("children").value) || 0;

      if (adults + children === 0) {
        alert("Please enter at least one ticket.");
        return;
      }

      const total = adults * PRICE_ADULT + children * PRICE_CHILD;

      const booking = {
        seatId: selectedSeat.id,
        adults,
        children,
        total,
        userId: currentUser.uid,
        createdAt: new Date()
      };

      try {
        await addDoc(collection(db, "bookings"), booking);

        bookings.push(booking);
        selectedSeat.taken = true;

        renderSeats();
        updateRevenue();
        cancelBooking();

        console.log("Booking saved to Firestore!");
      } catch (err) {
        console.error(err);
        alert("Error saving booking");
      }
    };

    // 🔥 LOAD FROM FIRESTORE
    async function loadBookings() {
      const querySnapshot = await getDocs(collection(db, "bookings"));

      bookings = [];

      querySnapshot.forEach((doc) => {
        const data = doc.data();
        bookings.push(data);

        const seat = seats.find(s => s.id === data.seatId);
        if (seat) seat.taken = true;
      });

      renderSeats();
      updateRevenue();
    }

    function updateRevenue() {
      let totalRevenue = 0;
      let totalTickets = 0;

      bookings.forEach(b => {
        totalRevenue += b.total;
        totalTickets += b.adults + b.children;
      });

      document.getElementById("revenue").textContent = totalRevenue;
      document.getElementById("tickets").textContent = totalTickets;
    }

    window.cancelBooking = function () {
      formEl.classList.add("hidden");
      document.getElementById("adults").value = "";
      document.getElementById("children").value = "";
    };

    renderSeats();
  </script>

</body>
</html>
