<!DOCTYPE html>
<html lang="en-GB">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SeatSync | Multi-Assignment</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap');
    body { font-family: 'Inter', sans-serif; }
    .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
    .seat-transition { transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1); }
    
    /* Custom Scrollbar for the ticket list */
    .custom-scroll::-webkit-scrollbar { width: 4px; }
    .custom-scroll::-webkit-scrollbar-track { background: rgba(255,255,255,0.05); }
    .custom-scroll::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
  </style>
</head>
<body class="bg-[#0f172a] text-slate-200 antialiased min-h-screen">

  <div class="max-w-2xl mx-auto p-8">
    <header class="text-center mb-12 mt-8">
      <h1 class="text-5xl font-extrabold tracking-tighter text-white mb-2">SEAT<span class="text-indigo-500 font-black">SYNC</span></h1>
      <p class="text-slate-500 font-light uppercase tracking-[0.4em] text-[10px]">Mixed-Type Reservation</p>
    </header>

    <div class="glass rounded-[3rem] p-10 shadow-2xl relative">
      <div class="w-full mb-16">
        <div class="w-1/2 h-[1px] bg-gradient-to-r from-transparent via-indigo-500/50 to-transparent mx-auto relative">
          <div class="absolute -top-3 left-1/2 -translate-x-1/2 text-[9px] text-indigo-400 uppercase tracking-[0.6em] font-bold">Stage</div>
        </div>
      </div>
      
      <div id="seating" class="grid grid-cols-5 gap-4 max-w-sm mx-auto"></div>

      <div id="multiAction" class="hidden mt-12 text-center pt-8 border-t border-slate-800/50">
        <button onclick="openBookingForm()" class="px-12 py-4 bg-white text-slate-950 rounded-full font-black uppercase tracking-widest text-xs transition-all hover:scale-105 active:scale-95 shadow-[0_0_30px_rgba(255,255,255,0.1)]">
          Assign Tickets for <span id="selectedCount">0</span> Seats
        </button>
      </div>
    </div>
  </div>

  <div id="bookingForm" class="hidden fixed inset-0 bg-slate-950/90 backdrop-blur-xl flex items-center justify-center p-6 z-50">
    <div class="bg-[#1e293b] p-8 rounded-[2.5rem] shadow-2xl w-full max-w-md border border-white/5">
      <h2 class="text-2xl font-black text-white mb-2 tracking-tight">ASSIGN TICKETS</h2>
      <p class="text-slate-500 text-xs uppercase tracking-widest mb-6">Select type for each seat</p>
      
      <div id="ticketList" class="space-y-3 max-h-[40vh] overflow-y-auto pr-2 custom-scroll mb-8">
        </div>

      <div class="pt-4 border-t border-slate-800 flex flex-col gap-3">
        <div class="flex justify-between items-center mb-2 px-2">
          <span class="text-slate-400 text-xs font-bold uppercase tracking-widest">Total</span>
          <span id="totalPriceDisplay" class="text-indigo-400 font-black text-xl">$0</span>
        </div>
        <button onclick="saveAllBookings()" class="w-full bg-indigo-600 py-5 rounded-2xl text-white font-black uppercase tracking-widest text-xs hover:bg-indigo-500 transition-all shadow-lg shadow-indigo-500/20">Finalise Reservation</button>
        <button onclick="cancelBooking()" class="w-full text-slate-500 text-[10px] font-bold uppercase tracking-widest py-2">Go Back</button>
      </div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, onSnapshot, doc, writeBatch, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBJeSiCRIltuDtB9ztQju8sBZ2zJfYUMtI",
      authDomain: "seatsync-3e23b.firebaseapp.com",
      projectId: "seatsync-3e23b",
      storageBucket: "seatsync-3e23b.firebasestorage.app",
      messagingSenderId: "446161771063",
      appId: "1:446161771063:web:02de1da576721fe8babdb2"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const seatingEl = document.getElementById("seating");
    const multiActionEl = document.getElementById("multiAction");
    const selectedCountEl = document.getElementById("selectedCount");
    const formEl = document.getElementById("bookingForm");
    const ticketListEl = document.getElementById("ticketList");
    const totalDisplay = document.getElementById("totalPriceDisplay");
    
    let tempSelectedSeats = []; // Array of seat IDs
    let seatAssignments = {}; // { seatId: 'adult' | 'child' }
    const TOTAL_SEATS = 25;

    onSnapshot(collection(db, "bookings"), (snapshot) => {
      const bookedIds = snapshot.docs.map(doc => doc.data().seatId);
      if (bookedIds.length >= TOTAL_SEATS) clearAllBookings();
      renderGrid(bookedIds);
    });

    function renderGrid(bookedIds) {
      seatingEl.innerHTML = "";
      for (let i = 1; i <= TOTAL_SEATS; i++) {
        const isTaken = bookedIds.includes(i);
        const isSelected = tempSelectedSeats.includes(i);
        const btn = document.createElement("button");
        btn.textContent = i;
        btn.disabled = isTaken;
        
        let style = "bg-slate-800/40 text-slate-500 border border-white/5 hover:border-indigo-500/50 hover:text-indigo-400";
        if (isTaken) style = "bg-slate-900/20 text-slate-800 border-transparent cursor-not-allowed opacity-40";
        if (isSelected) style = "bg-indigo-600 text-white border-indigo-400 z-10 scale-110 shadow-indigo-500/20 shadow-xl";

        btn.className = `seat-transition aspect-square rounded-2xl font-black text-sm ${style}`;
        btn.onclick = () => toggleSeat(i, bookedIds);
        seatingEl.appendChild(btn);
      }
    }

    function toggleSeat(id, bookedIds) {
      if (tempSelectedSeats.includes(id)) {
        tempSelectedSeats = tempSelectedSeats.filter(s => s !== id);
        delete seatAssignments[id];
      } else {
        tempSelectedSeats.push(id);
        seatAssignments[id] = 'adult'; // Default to adult
      }
      selectedCountEl.textContent = tempSelectedSeats.length;
      multiActionEl.classList.toggle("hidden", tempSelectedSeats.length === 0);
      renderGrid(bookedIds);
    }

    window.openBookingForm = () => {
      renderTicketList();
      formEl.classList.remove("hidden");
    };

    function renderTicketList() {
      ticketListEl.innerHTML = "";
      let total = 0;

      tempSelectedSeats.sort((a,b) => a-b).forEach(id => {
        const type = seatAssignments[id];
        total += type === 'adult' ? 10 : 5;

        const row = document.createElement("div");
        row.className = "flex items-center justify-between p-4 bg-slate-800/50 rounded-2xl border border-white/5";
        row.innerHTML = `
          <span class="font-black text-indigo-400">#${id}</span>
          <div class="flex bg-slate-900 p-1 rounded-xl border border-slate-700">
            <button onclick="setSeatType(${id}, 'adult')" class="px-4 py-1.5 rounded-lg text-[10px] font-bold uppercase transition-all ${type === 'adult' ? 'bg-indigo-600 text-white shadow-lg' : 'text-slate-500'}">Adult</button>
            <button onclick="setSeatType(${id}, 'child')" class="px-4 py-1.5 rounded-lg text-[10px] font-bold uppercase transition-all ${type === 'child' ? 'bg-indigo-600 text-white shadow-lg' : 'text-slate-500'}">Child</button>
          </div>
        `;
        ticketListEl.appendChild(row);
      });
      totalDisplay.textContent = `$${total}`;
    }

    window.setSeatType = (id, type) => {
      seatAssignments[id] = type;
      renderTicketList();
    };

    window.saveAllBookings = async function() {
      const batch = writeBatch(db);
      
      tempSelectedSeats.forEach(seatId => {
        const type = seatAssignments[seatId];
        const docRef = doc(collection(db, "bookings"));
        batch.set(docRef, {
          seatId,
          adults: type === 'adult' ? 1 : 0,
          children: type === 'child' ? 1 : 0,
          total: type === 'adult' ? 10 : 5,
          created: new Date()
        });
      });

      await batch.commit();
      tempSelectedSeats = [];
      seatAssignments = {};
      multiActionEl.classList.add("hidden");
      cancelBooking();
    };

    async function clearAllBookings() {
      const snap = await getDocs(collection(db, "bookings"));
      const batch = writeBatch(db);
      snap.forEach(d => batch.delete(doc(db, "bookings", d.id)));
      await batch.commit();
    }

    window.cancelBooking = () => formEl.classList.add("hidden");
  </script>
</body>
</html>
