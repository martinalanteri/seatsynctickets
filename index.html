<!DOCTYPE html>
<html lang="en-GB">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SeatSync | Premium Numbered Booking</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap');
    body { font-family: 'Inter', sans-serif; }
    .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
    .seat-transition { transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1); }
  </style>
</head>
<body class="bg-[#0f172a] text-slate-200 antialiased min-h-screen">

  <div class="max-w-2xl mx-auto p-8">
    <header class="text-center mb-16 mt-8">
      <h1 class="text-5xl font-extrabold tracking-tighter text-white mb-2">SEAT<span class="text-indigo-500">SYNC</span></h1>
      <p class="text-slate-400 font-light uppercase tracking-[0.4em] text-xs">Curated Experience Booking</p>
    </header>

    <div class="glass rounded-3xl p-10 shadow-2xl relative overflow-hidden">
      <div class="absolute -top-24 -left-24 w-48 h-48 bg-indigo-600/20 blur-[100px]"></div>
      
      <div class="w-full mb-16">
        <div class="w-2/3 h-[2px] bg-gradient-to-r from-transparent via-indigo-500 to-transparent mx-auto relative">
          <div class="absolute -top-4 left-1/2 -translate-x-1/2 text-[10px] text-indigo-400 uppercase tracking-[0.5em] font-semibold">Stage</div>
        </div>
      </div>
      
      <div id="seating" class="grid grid-cols-5 gap-5 max-w-sm mx-auto"></div>

      <div id="multiAction" class="hidden mt-12 text-center pt-8 border-t border-slate-800 animate-fade-in">
        <button onclick="openBookingForm()" class="group relative px-10 py-4 bg-white text-slate-900 rounded-full font-bold overflow-hidden transition-all hover:scale-105 active:scale-95 shadow-[0_0_20px_rgba(255,255,255,0.1)]">
          <span class="relative z-10">Confirm <span id="selectedCount">0</span> Seats</span>
        </button>
      </div>
    </div>
  </div>

  <div id="bookingForm" class="hidden fixed inset-0 bg-slate-950/80 backdrop-blur-md flex items-center justify-center p-6 z-50">
    <div class="bg-[#1e293b] p-10 rounded-[2.5rem] shadow-2xl w-full max-w-md border border-slate-700/50">
      <h2 class="text-3xl font-extrabold text-white mb-2 uppercase">Selection</h2>
      <p class="text-slate-400 mb-8 font-light italic">Assign a tier to your selected numbered seats</p>
      
      <div class="space-y-4">
        <div onclick="selectType('adult')" class="group flex items-center justify-between p-6 rounded-2xl border border-slate-700 hover:border-indigo-500 hover:bg-indigo-500/5 transition-all cursor-pointer">
          <div>
            <p class="text-lg font-bold text-white group-hover:text-indigo-400 transition">Premier Adult</p>
            <p class="text-sm text-slate-400">$10.00 / seat</p>
          </div>
          <div id="adultCheck" class="w-6 h-6 border border-slate-600 rounded-full flex items-center justify-center text-xs"></div>
        </div>

        <div onclick="selectType('child')" class="group flex items-center justify-between p-6 rounded-2xl border border-slate-700 hover:border-indigo-500 hover:bg-indigo-500/5 transition-all cursor-pointer">
          <div>
            <p class="text-lg font-bold text-white group-hover:text-indigo-400 transition">Junior Delegate</p>
            <p class="text-sm text-slate-400">$5.00 / seat</p>
          </div>
          <div id="childCheck" class="w-6 h-6 border border-slate-600 rounded-full flex items-center justify-center text-xs"></div>
        </div>

        <div class="flex flex-col gap-4 pt-8">
          <button onclick="saveAllBookings()" class="w-full bg-indigo-600 hover:bg-indigo-500 text-white py-5 rounded-2xl font-black tracking-widest uppercase transition-all shadow-lg">Finalise Reservation</button>
          <button onclick="cancelBooking()" class="w-full text-slate-500 hover:text-white text-sm font-medium transition">Discard Selection</button>
        </div>
      </div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, addDoc, onSnapshot, getDocs, doc, writeBatch } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBJeSiCRIltuDtB9ztQju8sBZ2zJfYUMtI",
      authDomain: "seatsync-3e23b.firebaseapp.com",
      projectId: "seatsync-3e23b",
      storageBucket: "seatsync-3e23b.firebasestorage.app",
      messagingSenderId: "446161771063",
      appId: "1:446161771063:web:02de1da576721fe8babdb2"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const seatingEl = document.getElementById("seating");
    const multiActionEl = document.getElementById("multiAction");
    const selectedCountEl = document.getElementById("selectedCount");
    const formEl = document.getElementById("bookingForm");
    
    let tempSelectedSeats = [];
    let selectedType = null;
    const TOTAL_SEATS = 25;
    const PRICE_ADULT = 10;
    const PRICE_CHILD = 5;

    onSnapshot(collection(db, "bookings"), (snapshot) => {
      const bookedIds = snapshot.docs.map(doc => doc.data().seatId);
      if (bookedIds.length >= TOTAL_SEATS) clearAllBookings();
      renderGrid(bookedIds);
    });

    function renderGrid(bookedIds) {
      seatingEl.innerHTML = "";
      for (let i = 1; i <= TOTAL_SEATS; i++) {
        const isTaken = bookedIds.includes(i);
        const isSelected = tempSelectedSeats.includes(i);
        const btn = document.createElement("button");
        
        btn.textContent = i; // Numbering added here
        btn.disabled = isTaken;
        
        let style = "bg-slate-800 text-slate-400 border border-slate-700 hover:border-indigo-500 hover:text-indigo-400";
        if (isTaken) style = "bg-slate-900 text-slate-800 border-transparent cursor-not-allowed opacity-40";
        if (isSelected) style = "bg-indigo-600 text-white border-indigo-400 shadow-[0_0_20px_rgba(79,70,229,0.5)] scale-110 z-10";

        btn.className = `seat-transition aspect-square rounded-xl font-bold text-base ${style}`;
        btn.onclick = () => toggleSeatSelection(i, bookedIds);
        seatingEl.appendChild(btn);
      }
    }

    function toggleSeatSelection(id, bookedIds) {
      tempSelectedSeats = tempSelectedSeats.includes(id) 
        ? tempSelectedSeats.filter(item => item !== id) 
        : [...tempSelectedSeats, id];
      
      selectedCountEl.textContent = tempSelectedSeats.length;
      multiActionEl.classList.toggle("hidden", tempSelectedSeats.length === 0);
      renderGrid(bookedIds);
    }

    window.selectType = (type) => {
      selectedType = type;
      const adult = document.getElementById('adultCheck');
      const child = document.getElementById('childCheck');
      adult.innerHTML = type === 'adult' ? '●' : '';
      child.innerHTML = type === 'child' ? '●' : '';
      adult.className = `w-6 h-6 border-2 rounded-full flex items-center justify-center ${type === 'adult' ? 'border-indigo-500 text-indigo-500' : 'border-slate-600'}`;
      child.className = `w-6 h-6 border-2 rounded-full flex items-center justify-center ${type === 'child' ? 'border-indigo-500 text-indigo-500' : 'border-slate-600'}`;
    };

    window.openBookingForm = () => formEl.classList.remove("hidden");

    window.saveAllBookings = async function() {
      if (!selectedType) return alert("Please select a reservation tier.");
      const batch = writeBatch(db);
      const price = selectedType === 'adult' ? PRICE_ADULT : PRICE_CHILD;

      tempSelectedSeats.forEach(seatId => {
        const docRef = doc(collection(db, "bookings"));
        batch.set(docRef, {
          seatId,
          adults: selectedType === 'adult' ? 1 : 0,
          children: selectedType === 'child' ? 1 : 0,
          total: price,
          created: new Date()
        });
      });

      await batch.commit();
      tempSelectedSeats = [];
      selectedType = null;
      multiActionEl.classList.add("hidden");
      cancelBooking();
    };

    async function clearAllBookings() {
      const querySnapshot = await getDocs(collection(db, "bookings"));
      const batch = writeBatch(db);
      querySnapshot.forEach((d) => batch.delete(doc(db, "bookings", d.id)));
      await batch.commit();
    }

    window.cancelBooking = () => {
      formEl.classList.add("hidden");
      selectedType = null;
      document.getElementById('adultCheck').innerHTML = '';
      document.getElementById('childCheck').innerHTML = '';
    };
  </script>
</body>
</html>
