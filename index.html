<!DOCTYPE html>
<html lang="en-GB">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SeatSync | Multi-Booking</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 text-slate-900 antialiased">

  <div class="max-w-4xl mx-auto p-6">
    <header class="text-center mb-8">
      <h1 class="text-4xl font-extrabold tracking-tight">🎭 SeatSync</h1>
      <p class="text-slate-500">Tap seats to select, then book all at once</p>
    </header>

    <div class="grid grid-cols-2 gap-4 mb-8">
      <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-200 text-center">
        <p class="text-xs font-bold uppercase tracking-widest text-slate-400 mb-1">Tickets Sold</p>
        <p id="tickets" class="text-3xl font-black">0</p>
      </div>
      <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-200 text-center">
        <p class="text-xs font-bold uppercase tracking-widest text-slate-400 mb-1">Total Revenue</p>
        <p class="text-3xl font-black text-emerald-600">$<span id="revenue">0</span></p>
      </div>
    </div>

    <div class="bg-white p-8 rounded-2xl shadow-md border border-slate-200 mb-8">
      <div class="w-full h-4 bg-slate-800 rounded-t-full mb-12 flex items-center justify-center">
        <span class="text-[10px] text-white uppercase tracking-[0.3em] font-bold">Stage</span>
      </div>
      
      <div id="seating" class="grid grid-cols-5 gap-4 max-w-sm mx-auto"></div>

      <div id="multiAction" class="hidden mt-8 text-center border-t pt-6">
        <p class="mb-4 font-medium text-slate-600">Selected Seats: <span id="selectedCount" class="font-bold text-black">0</span></p>
        <button onclick="openBookingForm()" class="bg-black text-white px-8 py-3 rounded-xl font-bold hover:bg-slate-800 transition shadow-lg">
          Book Selected Seats
        </button>
      </div>
    </div>

    <div id="bookingForm" class="hidden fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center p-4 z-50">
      <div class="bg-white p-8 rounded-2xl shadow-2xl w-full max-w-sm">
        <h2 class="text-2xl font-bold mb-4">Ticket Type</h2>
        
        <div class="space-y-6">
          <div class="flex items-center justify-between p-4 border rounded-xl hover:bg-slate-50 transition cursor-pointer" onclick="selectType('adult')">
            <div>
              <p class="font-bold">Adult</p>
              <p class="text-sm text-slate-500">$10.00 per seat</p>
            </div>
            <div id="adultCheck" class="w-6 h-6 border-2 rounded-full flex items-center justify-center"></div>
          </div>

          <div class="flex items-center justify-between p-4 border rounded-xl hover:bg-slate-50 transition cursor-pointer" onclick="selectType('child')">
            <div>
              <p class="font-bold">Child</p>
              <p class="text-sm text-slate-500">$5.00 per seat</p>
            </div>
            <div id="childCheck" class="w-6 h-6 border-2 rounded-full flex items-center justify-center"></div>
          </div>

          <div class="flex gap-3 pt-2">
            <button onclick="saveAllBookings()" class="flex-1 bg-black text-white px-4 py-3 rounded-xl font-bold hover:bg-slate-800 transition">Confirm Booking</button>
            <button onclick="cancelBooking()" class="flex-1 bg-slate-100 text-slate-600 px-4 py-3 rounded-xl font-bold hover:bg-slate-200 transition">Cancel</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, addDoc, onSnapshot, getDocs, deleteDoc, doc, writeBatch } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBJeSiCRIltuDtB9ztQju8sBZ2zJfYUMtI",
      authDomain: "seatsync-3e23b.firebaseapp.com",
      projectId: "seatsync-3e23b",
      storageBucket: "seatsync-3e23b.firebasestorage.app",
      messagingSenderId: "446161771063",
      appId: "1:446161771063:web:02de1da576721fe8babdb2"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const seatingEl = document.getElementById("seating");
    const multiActionEl = document.getElementById("multiAction");
    const selectedCountEl = document.getElementById("selectedCount");
    const formEl = document.getElementById("bookingForm");
    
    let tempSelectedSeats = [];
    let selectedType = null; // 'adult' or 'child'
    const TOTAL_SEATS = 25;
    const PRICE_ADULT = 10;
    const PRICE_CHILD = 5;

    onSnapshot(collection(db, "bookings"), (snapshot) => {
      const bookedIds = [];
      let totalRev = 0;
      let totalTix = 0;

      snapshot.forEach((doc) => {
        const data = doc.data();
        bookedIds.push(data.seatId);
        totalRev += data.total;
        totalTix += (data.adults + data.children);
      });

      if (bookedIds.length >= TOTAL_SEATS) {
        alert("Performance Sold Out! Resetting the board...");
        clearAllBookings();
      }

      renderGrid(bookedIds);
      updateUI(totalRev, totalTix);
    });

    function renderGrid(bookedIds) {
      seatingEl.innerHTML = "";
      for (let i = 1; i <= TOTAL_SEATS; i++) {
        const isTaken = bookedIds.includes(i);
        const isSelected = tempSelectedSeats.includes(i);
        const btn = document.createElement("button");
        btn.textContent = i;
        btn.disabled = isTaken;
        
        let colorClass = "bg-emerald-500 hover:bg-emerald-600 text-white shadow";
        if (isTaken) colorClass = "bg-slate-200 text-slate-400 cursor-not-allowed";
        if (isSelected) colorClass = "bg-blue-600 text-white ring-4 ring-blue-200 scale-105";

        btn.className = `p-4 rounded-lg font-bold text-lg transition-all duration-150 ${colorClass}`;
        btn.onclick = () => toggleSeatSelection(i, bookedIds);
        seatingEl.appendChild(btn);
      }
    }

    function toggleSeatSelection(id, bookedIds) {
      if (tempSelectedSeats.includes(id)) {
        tempSelectedSeats = tempSelectedSeats.filter(item => item !== id);
      } else {
        tempSelectedSeats.push(id);
      }
      selectedCountEl.textContent = tempSelectedSeats.length;
      multiActionEl.classList.toggle("hidden", tempSelectedSeats.length === 0);
      renderGrid(bookedIds);
    }

    window.selectType = (type) => {
      selectedType = type;
      document.getElementById('adultCheck').innerHTML = type === 'adult' ? '✓' : '';
      document.getElementById('childCheck').innerHTML = type === 'child' ? '✓' : '';
      document.getElementById('adultCheck').className = `w-6 h-6 border-2 rounded-full flex items-center justify-center ${type === 'adult' ? 'bg-black text-white border-black' : 'border-slate-300'}`;
      document.getElementById('childCheck').className = `w-6 h-6 border-2 rounded-full flex items-center justify-center ${type === 'child' ? 'bg-black text-white border-black' : 'border-slate-300'}`;
    };

    window.openBookingForm = () => formEl.classList.remove("hidden");

    window.saveAllBookings = async function() {
      if (!selectedType) return alert("Please select a ticket type (Adult or Child).");

      const batch = writeBatch(db);
      const isAdult = selectedType === 'adult';
      const price = isAdult ? PRICE_ADULT : PRICE_CHILD;
      const totalPerSeat = price;

      tempSelectedSeats.forEach(seatId => {
        const docRef = doc(collection(db, "bookings"));
        batch.set(docRef, {
          seatId,
          adults: isAdult ? 1 : 0,
          children: isAdult ? 0 : 1,
          total: totalPerSeat,
          created: new Date()
        });
      });

      try {
        await batch.commit();
        tempSelectedSeats = [];
        selectedType = null;
        multiActionEl.classList.add("hidden");
        cancelBooking();
      } catch (err) {
        console.error("Batch error:", err);
      }
    };

    async function clearAllBookings() {
      const querySnapshot = await getDocs(collection(db, "bookings"));
      const batch = writeBatch(db);
      querySnapshot.forEach((d) => batch.delete(doc(db, "bookings", d.id)));
      await batch.commit();
    }

    window.cancelBooking = function() {
      formEl.classList.add("hidden");
      selectedType = null;
      document.getElementById('adultCheck').innerHTML = '';
      document.getElementById('childCheck').innerHTML = '';
    };

    function updateUI(rev, tix) {
      document.getElementById("revenue").textContent = rev.toLocaleString();
      document.getElementById("tickets").textContent = tix.toLocaleString();
    }
  </script>
</body>
</html>
